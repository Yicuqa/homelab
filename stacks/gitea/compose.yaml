services:
  gitea:
    image: gitea/gitea:1.25
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3030:3000"   # web UI (3000 är upptaget av yumrate på hosten)
      - "2222:22"     # git över SSH på LAN
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      TZ: Europe/Stockholm
      # Publik HTTPS-yta via cloudflared-tunneln; SSH-kloning sker på LAN
      # (tunneln proxar bara HTTP). Registrering avstängd — single user.
      GITEA__server__DOMAIN: git.szakoswulkan.eu
      GITEA__server__ROOT_URL: https://git.szakoswulkan.eu/
      GITEA__server__SSH_DOMAIN: 192.168.68.107
      GITEA__server__SSH_PORT: "2222"
      GITEA__service__DISABLE_REGISTRATION: "true"
      # Skippa webb-installern: initiera direkt med SQLite. Admin-kontot
      # skapas via CLI (gitea admin user create) efter första uppstarten.
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__webhook__ALLOWED_HOST_LIST: "192.168.68.107"
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      flame.type: application
      flame.name: Gitea
      flame.icon: source-repository
      flame.url: https://git.szakoswulkan.eu

volumes:
  gitea-data:
