services:
  claude-office:
    build:
      context: https://github.com/Yicuqa/claude-office.git#relative-urls
    image: claude-office:local
    container_name: claude-office
    restart: unless-stopped
    ports:
      - "8000:8000"   # frontend + backend (Next.js statisk serverad från FastAPI)
    environment:
      # CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      TZ: Europe/Stockholm
      # Place the SQLite file inside the persistent volume mounted at /data
      # below. Without this, the backend writes to its default path
      # (/app/visualizer.db) which lives in the ephemeral container
      # filesystem and is wiped on every Komodo redeploy.
      DATABASE_URL: "sqlite+aiosqlite:////data/visualizer.db"
    volumes:
      - claude-office-data:/data

volumes:
  claude-office-data: