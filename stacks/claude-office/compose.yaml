services:
  claude-office:
    build:
      context: https://github.com/Yicuqa/claude-office.git#relative-urls
    image: claude-office:local
    container_name: claude-office
    restart: unless-stopped
    ports:
      - "8000:8000"   # frontend + backend (Next.js statisk serverad från FastAPI)
    environment:
      # CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      TZ: Europe/Stockholm
      # Persist the SQLite file inside the named volume below. The image
      # prepares /app/data with appuser ownership (see Dockerfile), so we
      # mount the volume there — mounting at a fresh path like /data
      # would be created root-owned and SQLite would fail to open the
      # file when the backend runs as appuser.
      DATABASE_URL: "sqlite+aiosqlite:////app/data/visualizer.db"
    volumes:
      - claude-office-data:/app/data

volumes:
  claude-office-data: