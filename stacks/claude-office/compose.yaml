services:
  claude-office:
    build:
      context: https://github.com/paulrobello/claude-office.git#main
    image: claude-office:local
    container_name: claude-office
    restart: unless-stopped
    ports:
      - "8000:8000"   # frontend + backend (Next.js statisk serverad från FastAPI)
    environment:
      # CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      TZ: Europe/Stockholm
    volumes:
      - claude-office-data:/data

volumes:
  claude-office-data: