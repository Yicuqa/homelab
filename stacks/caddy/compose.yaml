# Split-horizon TLS-terminering för LAN-trafik.
# Publika DNS pekar på Cloudflare-tunneln; Pi-hole pekar samma namn på
# LXC 200 (192.168.68.107) där Caddy svarar med riktigt cert via DNS-01.
# Caddyfilen ligger inline som compose-config eftersom Komodo-periphery
# klonar repot till en docker-volym — relativa bind-mounts når den inte.
# Lägg till ett block per hostname när fler tjänster ska få LAN-direktväg.

configs:
  caddyfile:
    content: |
      {
      	email clint.wulkan@gmail.com
      }

      stream.szakoswulkan.eu {
      	tls {
      		dns cloudflare {env.CLOUDFLARE_API_TOKEN}
      	}
      	encode zstd gzip
      	reverse_proxy 127.0.0.1:8096
      }

services:
  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:2.10.0
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: Europe/Stockholm
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - /opt/appdata/caddy/data:/data
      - /opt/appdata/caddy/config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/metrics"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
