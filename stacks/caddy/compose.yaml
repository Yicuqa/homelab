services:
  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:2.10.0
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: Europe/Stockholm
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/appdata/caddy/data:/data
      - /opt/appdata/caddy/config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/metrics"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
