services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Berlin
      - UMASK=022
    volumes:
      - /mnt/appdata/bazarr:/config
      - /mnt/Media/Movies:/movies
      - /mnt/Media/Series:/tv
    ports:
      - "6767:6767"
    restart: unless-stopped