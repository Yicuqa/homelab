services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    volumes:
      - /opt/appdata/prowlarr:/config
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Stockholm
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9696/ping > /dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
