services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - /opt/appdata/seerr:/app/config
      - /opt/appdata/seerr/logs:/app/config/logs
    environment:
      TZ: Europe/Stockholm
      LOG_LEVEL: info
    labels:
      flame.type: application
      flame.name: Jellyseerr
      flame.icon: movie-search
      flame.url: https://wish.szakoswulkan.eu
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://$$(hostname -i):5055/api/v1/status || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
