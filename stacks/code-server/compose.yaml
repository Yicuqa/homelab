services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Stockholm
      PASSWORD: ${CODE_SERVER_PASSWORD}
      SUDO_PASSWORD: ${CODE_SERVER_SUDO_PASSWORD}
      DEFAULT_WORKSPACE: /config/workspace
      PROXY_DOMAIN: code.szakoswulkan.eu
    volumes:
      - /opt/appdata/code-server:/config
      - /opt:/config/workspace
      - /opt/appdata/code-server/custom-cont-init.d:/custom-cont-init.d
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://$$(hostname -i):8443/healthz || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
