services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Stockholm
      PASSWORD: ${CODE_SERVER_PASSWORD}
      SUDO_PASSWORD: ${CODE_SERVER_SUDO_PASSWORD}
      DEFAULT_WORKSPACE: /config/workspace
      PROXY_DOMAIN: code.szakoswulkan.eu
      DOCKER_HOST: ssh://root@192.168.68.107
    volumes:
      - /opt/appdata/code-server:/config
      - /opt/workspace:/config/workspace
      - /opt/appdata/code-server/custom-cont-init.d:/custom-cont-init.d
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      flame.type: application
      flame.name: Code Server
      flame.icon: code-braces
      flame.url: https://code.szakoswulkan.eu
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8443/healthz > /dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
