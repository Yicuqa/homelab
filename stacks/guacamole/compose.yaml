services:
  guacamole-init:
    image: guacamole/guacamole:1.5.5
    container_name: guacamole-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        if [ ! -f /init/01-initdb.sql ]; then
          /opt/guacamole/bin/initdb.sh --postgresql > /init/01-initdb.sql;
        fi
    volumes:
      - guacamole-initdb:/init
    restart: "no"

  guacamole-db:
    image: postgres:15-alpine
    container_name: guacamole-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?set GUACAMOLE_DB_PASSWORD in Komodo stack env}
      TZ: Europe/Stockholm
    volumes:
      - guacamole-db-data:/var/lib/postgresql/data
      - guacamole-initdb:/docker-entrypoint-initdb.d:ro
    depends_on:
      guacamole-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole_user -d guacamole_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  guacd:
    image: guacamole/guacd:1.5.5
    container_name: guacd
    restart: unless-stopped
    environment:
      TZ: Europe/Stockholm
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4822 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  guacamole:
    image: guacamole/guacamole:1.5.5
    container_name: guacamole
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: guacamole-db
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USER: guacamole_user
      POSTGRESQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:?set GUACAMOLE_DB_PASSWORD in Komodo stack env}
      POSTGRESQL_AUTO_CREATE_ACCOUNTS: "true"
      TZ: Europe/Stockholm
    depends_on:
      guacamole-db:
        condition: service_healthy
      guacd:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/guacamole/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  guacamole-db-data:
  guacamole-initdb:
